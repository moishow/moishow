<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>모이쇼 — 사용자 프로필</title>
<link rel="stylesheet" href="../../system/tokens.css"><link rel="stylesheet" href="../../system/components.css">
<style>
  body{margin:0;background:#faf9f5;display:flex;justify-content:center;padding:24px 0}
  .profile{margin:16px 20px 0;text-align:center}
  .profile__avatar{width:80px;height:80px;margin:0 auto;border-radius:50%;background:var(--gray-700);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:var(--fs-heading);font-weight:var(--weight-bold)}
  .profile__name{margin-top:10px;font-size:var(--fs-title);font-weight:var(--weight-bold);color:var(--text-strong)}
  .profile__bio{margin-top:4px;color:var(--text-muted);font-size:var(--fs-caption);line-height:var(--lh-normal)}
  .profile__stats{display:flex;margin-top:18px;border-top:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle)}
  .stat{flex:1;padding:12px 0;color:var(--text-muted);font-size:var(--fs-caption)}
  .stat+.stat{border-left:1px solid var(--border-subtle)}
  .stat b{display:block;color:var(--text-strong);font-size:var(--fs-subtitle)}
  .shared{margin:16px 20px 0;padding:14px 16px;background:var(--surface-sunken);border-radius:var(--radius-lg);font-size:var(--fs-caption);color:var(--text-muted)}
  .shared b{color:var(--text-strong)}
  .posts{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px 20px 0}
  .post{aspect-ratio:1;border-radius:var(--radius-sm);background:var(--surface-sunken);display:flex;align-items:center;justify-content:center;color:var(--text-faint);text-decoration:none}
  .post .icon{width:26px;height:26px}
</style></head><body>
  <div class="phone"><div class="screen surface-community">
    <header class="appbar"><button type="button" onclick="history.back()" aria-label="뒤로" style="display:inline-flex;padding:10px;margin:-10px;border:0;background:transparent"><svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button><div class="appbar__title">프로필</div><span style="width:24px"></span></header>
    <div class="profile"><div class="profile__avatar">이</div><div class="profile__name">이지훈</div><div class="profile__bio">수요풋살과 등산을 좋아해요.</div><button id="follow-button" type="button" class="btn btn--primary btn--block" style="margin-top:14px">팔로우</button><div class="profile__stats"><div class="stat"><b class="num">18</b>게시글</div><div class="stat"><b class="num">96</b>팔로워</div><div class="stat"><b class="num">112</b>팔로잉</div></div></div>
    <div class="shared"><b>함께한 모임 2개</b><br>수요풋살 · 봄 시즌 킥오프</div>
    <div class="section-title">최근 게시글</div><div class="posts"><a class="post" href="../../system/screens/W-33.html" aria-label="이지훈의 게시글 상세"><svg class="icon"><rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></a><a class="post" href="../../system/screens/W-33.html" aria-label="이지훈의 게시글 상세"><svg class="icon"><rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></a><a class="post" href="../../system/screens/W-33.html" aria-label="이지훈의 게시글 상세"><svg class="icon"><rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></a></div>
  </div></div>
  <script>document.getElementById('follow-button').addEventListener('click',(event)=>{const button=event.currentTarget;const following=button.textContent==='팔로잉';button.textContent=following?'팔로우':'팔로잉';button.classList.toggle('btn--primary',following);button.classList.toggle('btn--secondary',!following);});</script>
</body></html>
