<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>모이쇼 — 계좌 등록 · 인증</title>
<link rel="stylesheet" href="../../system/tokens.css"><link rel="stylesheet" href="../../system/components.css">
<style>
  body{margin:0;background:#faf9f5;display:flex;justify-content:center;padding:24px 0}
  .acct { margin:12px 20px 0; background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:var(--radius-xl); padding:16px; box-shadow:var(--shadow-card); display:flex; align-items:center; gap:12px; }
  .acct__ic { width:40px; height:40px; border-radius:var(--radius-md); background:var(--color-primary-soft); color:var(--color-primary); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .acct__b { flex:1; min-width:0; }
  .acct__bank { font-size:var(--fs-body); font-weight:var(--weight-bold); color:var(--text-title); }
  .acct__no { font-size:var(--fs-caption); color:var(--text-muted); margin-top:2px; font-feature-settings:var(--font-feature-numeric); }
  .row2 { display:flex; gap:12px; margin:12px 20px 0; }
  .row2 .field { flex:1; margin:0; }
  .field-hint { font-size:var(--fs-micro); color:var(--text-muted); margin-top:6px; }
  .field-hint b { color:var(--color-primary); font-weight:var(--weight-semibold); }
  .code-row { display:flex; gap:8px; }
  .code-row .field__input { flex:1; letter-spacing:.12em; }
</style></head><body>
  <div class="phone"><div class="screen surface-money">
    <header class="appbar">
      <a href="../account-settings/account-settings.html" aria-label="뒤로" style="display:inline-flex;padding:10px;margin:-10px"><svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></a>
      <div class="appbar__title">계좌 등록 · 인증</div>
      <span style="width:24px"></span>
    </header>

    <!-- 현재 등록된 계좌 -->
    <div class="section-title">등록된 계좌</div>
    <div class="acct">
      <div class="acct__ic"><svg class="icon"><rect x="3" y="6" width="18" height="13" rx="2.5" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 10h18" stroke="currentColor" stroke-width="2"/><circle cx="16.5" cy="14.5" r="1.3" fill="currentColor"/></svg></div>
      <div class="acct__b">
        <div class="acct__bank">카카오뱅크</div>
        <div class="acct__no num">3333-01-****567 · 예금주 김산</div>
      </div>
      <span class="badge badge--done">인증됨</span>
    </div>

    <div class="divider"></div>

    <!-- 새 계좌 인증 -->
    <div class="section-title">새 계좌 인증</div>

    <div class="stepper" style="margin:8px 20px 0">
      <div class="step is-done"><span class="step__node"><svg class="icon"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span><div class="step__label">계좌 입력</div></div>
      <div class="step is-current"><span class="step__seg"></span><span class="step__node">2</span><div class="step__label">1원 입금</div></div>
      <div class="step"><span class="step__seg"></span><span class="step__node">3</span><div class="step__label">코드 확인</div></div>
    </div>

    <div class="field" style="margin-top:20px">
      <label class="field__label">은행</label>
      <div class="select"><select class="field__input">
        <option>카카오뱅크</option><option>토스뱅크</option><option>국민은행</option><option>신한은행</option>
        <option>우리은행</option><option>하나은행</option><option>농협은행</option><option>기업은행</option>
      </select></div>
    </div>

    <div class="field" style="margin-top:12px">
      <label class="field__label">계좌번호</label>
      <input class="field__input num" inputmode="numeric" placeholder="- 없이 숫자만 입력">
    </div>

    <div class="field" style="margin-top:12px">
      <label class="field__label">생년월일 (예금주 확인용)</label>
      <input class="field__input" type="date" value="1996-03-12">
      <div class="field-hint">계좌번호와 생년월일이 모두 일치해야 <b>예금주명</b>을 확인할 수 있어요.</div>
    </div>

    <button class="btn btn--primary btn--block" style="margin:16px 20px 0">1원 입금 요청</button>

    <div class="field" style="margin-top:16px">
      <label class="field__label">인증코드 (입금자명 4자리)</label>
      <div class="code-row">
        <input class="field__input num" maxlength="4" placeholder="예: 1234">
        <button class="btn btn--primary" style="flex:none;padding:0 20px">확인</button>
      </div>
      <div class="field-hint">은행 앱·문자에서 <b>1원 입금자명</b>에 표시된 코드를 입력하세요.</div>
    </div>

    <div class="notice" style="margin-top:16px">
      <svg class="icon"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.8" r="1.1" fill="currentColor"/></svg>
      <div class="notice__text">본인 명의 계좌만 등록할 수 있어요. 예금주명이 <b>가입한 실명</b>과 다르면 인증이 실패해요.</div>
    </div>
  </div></div>
</body></html>
