<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>모이쇼 — 홈 FAB 만들기 액션시트 (D7)</title>
    <!--
      FAB "+" → 만들기 액션시트(D7). 홈 위에 뜨는 바텀시트 상태.
      글쓰기 / 모임 만들기 / 정모 개설(총무만·RBAC) / 번개. 개설 진입점은 FAB로 단일화(D8).
    -->
    <link rel="stylesheet" href="../../system/tokens.css" />
    <link rel="stylesheet" href="../../system/components.css" />
    <style>
      body {
        margin: 0;
        background: #fff;
        display: flex;
        justify-content: center;
        padding: 0;
      }
      .home-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 16px 20px 0;
      }
      .greet__hi {
        font: var(--text-editorial);
        font-size: 23px;
        letter-spacing: var(--ls-title);
        color: var(--text-strong);
      }
      .greet__sub {
        font-size: var(--fs-caption);
        color: var(--text-muted);
        margin-top: 3px;
      }
      .home-actions {
        display: flex;
        align-items: center;
        gap: 14px;
        color: var(--text-title);
      }
      .home-actions .home-icon {
        color: var(--text-title);
        display: inline-flex;
      }
      .bell {
        position: relative;
        color: var(--text-title);
      }
      .bell__dot {
        position: absolute;
        top: 1px;
        right: 1px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--color-danger);
        border: 1.5px solid #fff;
      }
      .sec-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 20px 4px;
      }
      .sec-head__t {
        font-size: var(--fs-title);
        font-weight: var(--weight-bold);
        color: var(--text-title);
        letter-spacing: var(--ls-title);
      }
      .todo {
        margin: 6px 20px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .todo-card {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--surface-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        padding: 12px 13px;
      }
      .todo-card__ic {
        width: 38px;
        height: 38px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .todo-card__ic .icon {
        width: 20px;
        height: 20px;
      }
      .todo-card__b {
        flex: 1;
        min-width: 0;
      }
      .todo-card__t {
        font-size: var(--fs-body);
        font-weight: var(--weight-bold);
        color: var(--text-title);
      }
      .todo-card__s {
        font-size: var(--fs-micro);
        color: var(--text-muted);
        margin-top: 2px;
      }
      /* ── FAB 만들기 액션시트 (D7) ── */
      .scrim {
        position: absolute;
        inset: 0;
        background: var(--surface-overlay);
        z-index: 1;
      }
      .sheet--fab {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
      }
      .sheet-action {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 4px;
      }
      .sheet-action + .sheet-action {
        border-top: 1px solid var(--border-subtle);
      }
      .sheet-action__ic {
        width: 42px;
        height: 42px;
        border-radius: var(--radius-md);
        background: var(--accent-soft);
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sheet-action__t {
        flex: 1;
        font-size: var(--fs-subtitle);
        font-weight: var(--weight-semibold);
        color: var(--text-title);
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="screen surface-money">
        <div class="home-top">
          <div>
            <div class="greet__hi">안녕하세요, 김산님</div>
            <div class="greet__sub">
              오늘 챙길 일
              <b class="num" style="color: var(--color-primary)">4</b>
              건이 있어요
            </div>
          </div>
          <div class="home-actions">
            <a class="home-icon" href="../../system/screens/W-06.html" aria-label="모임 탐색">
              <svg class="icon">
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </a>
            <div class="bell">
              <svg class="icon">
                <path d="M6 9a6 6 0 1112 0c0 5 2 6 2 6H4s2-1 2-6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" />
                <path d="M10 20a2 2 0 004 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
              </svg>
              <span class="bell__dot"></span>
            </div>
          </div>
        </div>
        <div class="sec-head"><div class="sec-head__t">오늘 챙길 일</div></div>
        <div class="todo">
          <div class="todo-card">
            <div class="todo-card__ic" style="background: var(--color-danger-soft); color: var(--color-danger-strong)">
              <svg class="icon">
                <rect x="3" y="6" width="18" height="13" rx="2.5" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M3 10h18" stroke="currentColor" stroke-width="2" />
                <circle cx="16.5" cy="14.5" r="1.3" fill="currentColor" />
              </svg>
            </div>
            <div class="todo-card__b">
              <div class="todo-card__t">
                봄 시즌 킥오프 회비 송금
                <span class="badge badge--danger">마감 D-1</span>
              </div>
              <div class="todo-card__s">
                디자인동아리 모디 · 1인
                <span class="num">52,000</span>
                원
              </div>
            </div>
            <button class="btn btn--primary btn--sm">송금</button>
          </div>
        </div>

        <!-- 모달 스크림 + 바텀시트 -->
        <div class="scrim"></div>
        <div class="sheet sheet--fab">
          <div class="sheet__handle"></div>
          <div class="sheet__head">
            <div class="sheet__title">만들기</div>
            <button class="sheet__close">
              <svg class="icon"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
            </button>
          </div>
          <div class="sheet-action">
            <div class="sheet-action__ic">
              <svg class="icon"><path d="M5 19h14M7 15l9-9 3 3-9 9H7v-3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="sheet-action__t">글쓰기</div>
            <svg class="icon icon--sm" style="color: var(--text-faint)">
              <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </div>
          <div class="sheet-action">
            <div class="sheet-action__ic">
              <svg class="icon">
                <circle cx="9" cy="8" r="3.4" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M3 19c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
                <path d="M16 5.2A3.4 3.4 0 0118 11m-1 3.3c2.3.5 4 2.2 4 4.7" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
              </svg>
            </div>
            <div class="sheet-action__t">모임 만들기</div>
            <svg class="icon icon--sm" style="color: var(--text-faint)">
              <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </div>
          <div class="sheet-action">
            <div class="sheet-action__ic">
              <svg class="icon">
                <rect x="3" y="5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </div>
            <div class="sheet-action__t">정모 개설</div>
            <span class="badge badge--ended">
              <svg class="icon icon--sm" style="width: 11px; height: 11px; margin-right: 2px">
                <rect x="4.5" y="10.5" width="15" height="10" rx="2.2" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M8 10.5V7.5a4 4 0 018 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
              </svg>
              총무만
            </span>
          </div>
          <div class="sheet-action">
            <div class="sheet-action__ic">
              <svg class="icon"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="sheet-action__t">번개</div>
            <svg class="icon icon--sm" style="color: var(--text-faint)">
              <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </div>
        </div>

        <nav class="tabbar">
          <div class="tabbar__item is-active">
            <svg class="icon">
              <path d="M4 11l8-7 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
              <path d="M6 10v9a1 1 0 001 1h10a1 1 0 001-1v-9" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" />
            </svg>
            홈
          </div>
          <div class="tabbar__item">
            <svg class="icon">
              <rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none" />
              <circle cx="8.5" cy="10" r="1.6" fill="currentColor" />
              <path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
            피드
          </div>
          <div class="tabbar__fab">
            <svg class="icon"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
          </div>
          <div class="tabbar__item">
            <svg class="icon"><path d="M4 5.5h16v10H9l-4 3.2v-3.2H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" /></svg>
            DM
          </div>
          <div class="tabbar__item">
            <svg class="icon">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none" />
              <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" />
            </svg>
            마이
          </div>
        </nav>
      </div>
    </div>
  </body>
</html>
