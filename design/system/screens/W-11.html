<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}</style></head><body>
      <div class="phone"><div class="screen surface-money">
        <header class="appbar">
          <svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <div class="appbar__title">모임 상세</div>
          <svg class="icon"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/></svg>
        </header>
        <div class="identity">
          <div class="identity__avatar">모디</div>
          <div class="identity__name">디자인동아리 모디 <span class="chip">총무 김산</span></div>
        </div>
        <div class="headline">
          <h1>봄 시즌 킥오프<br><span class="light">자금</span> 락 완료</h1>
          <div class="meta">
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            6/30 19:00<span class="meta__dot"></span>성수동 글로우 스튜디오
            <span class="meta__end">만남 임박</span>
          </div>
        </div>
        <div class="card">
          <div class="card__head"><div class="card__title">모금 진행</div></div>
          <div class="stepper">
            <div class="step is-done"><div class="step__node"><svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div><div class="step__label">예치</div></div>
            <div class="step is-current"><div class="step__seg"></div><div class="step__node">2</div><div class="step__label">락</div></div>
            <div class="step"><div class="step__seg"></div><div class="step__node">3</div><div class="step__label">동의</div></div>
            <div class="step"><div class="step__seg"></div><div class="step__node">4</div><div class="step__label">출금</div></div>
            <div class="step"><div class="step__seg"></div><div class="step__node">5</div><div class="step__label">정산</div></div>
            <div class="step"><div class="step__seg"></div><div class="step__node">6</div><div class="step__label">완료</div></div>
          </div>
          <div class="stepper-note">만남 시각이 됐어요 — <b>곧 총무가 동의를 요청</b>해요</div>
        </div>
        <div class="slab">
          <div class="slab__label">락 완료 · 예치 총액</div>
          <div class="slab__figure"><span class="big num">1,820,000</span><span class="unit">P · 35명</span></div>
          <div class="slab__row"><span class="k">내 예치금</span><span class="v num">52,000P</span></div>
          <div class="slab__note">
            <svg class="icon" viewBox="0 0 24 24"><rect x="4.5" y="10.5" width="15" height="10" rx="2.2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8 10.5V7.5a4 4 0 018 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span>만남 시각 도달로 <b>취소·환불이 잠겼어요.</b> 총무 출금은 동의 절차 뒤에 열려요.</span>
          </div>
        </div>
        <div class="cta-bar">
          <div class="cta-bar__meta">내 예치금<br><b class="num">52,000P</b></div>
          <button class="btn btn--primary">정산 현황 자세히</button>
        </div>
      </div></div>
</body></html>
