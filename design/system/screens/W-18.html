<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}</style></head><body>
      <div class="phone"><div class="screen surface-money">
        <header class="appbar">
          <svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <div class="appbar__title">총무 출금</div>
          <span style="width:24px"></span>
        </header>
        <div class="headline"><h1>모인 금액을<br><span class="light">출금</span>해요</h1></div>
        <div class="card">
          <div class="card__head"><div class="card__title">모금 진행</div></div>
          <div class="stepper">
            <div class="step is-done"><div class="step__node"><svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div><div class="step__label">예치</div></div>
            <div class="step is-done"><div class="step__seg"></div><div class="step__node"><svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div><div class="step__label">락</div></div>
            <div class="step is-done"><div class="step__seg"></div><div class="step__node"><svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div><div class="step__label">동의</div></div>
            <div class="step is-current"><div class="step__seg"></div><div class="step__node">4</div><div class="step__label">출금</div></div>
            <div class="step"><div class="step__seg"></div><div class="step__node">5</div><div class="step__label">정산</div></div>
            <div class="step"><div class="step__seg"></div><div class="step__node">6</div><div class="step__label">완료</div></div>
          </div>
        </div>
        <div class="slab">
          <div class="slab__label">출금 가능 금액 · 동의 32명</div>
          <div class="slab__figure"><span class="big num">1,664,000</span><span class="unit">P</span></div>
          <div class="slab__row"><span class="k">별도 보관 · 페널티 적립금</span><span class="v num">31,200P</span></div>
          <div class="slab__note">
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span>출금하면 <b>정산 마감 24:00 타이머</b>가 시작돼요. 시간 안에 증빙·잔액을 반납해야 신용 패널티가 없어요.</span>
          </div>
        </div>
        <div class="cta-bar">
          <div class="cta-bar__meta">출금 금액<br><b class="num">1,664,000P</b></div>
          <button class="btn btn--primary">전액 출금</button>
        </div>
      </div></div>
</body></html>
