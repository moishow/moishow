<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>모이쇼 — W-13 충전</title>
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>
  body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
  /* 화면 고유 레이아웃: 빠른 금액 선택 그리드 */
  .amount-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 20px 0}
  .amount-opt{border:1.5px solid var(--border-default);border-radius:var(--radius-md);padding:14px 10px;text-align:center;font-size:var(--fs-subtitle);font-weight:var(--weight-bold);color:var(--text-body);background:var(--surface-card);font-feature-settings:var(--font-feature-numeric);transition:border-color var(--dur-fast) var(--ease-standard),background var(--dur-fast) var(--ease-standard)}
  .amount-opt small{font-size:12px;font-weight:var(--weight-medium);color:var(--text-faint);margin-left:2px}
  .amount-opt.is-on{border-color:var(--color-primary);background:var(--color-primary-soft);color:var(--color-primary)}
  .amount-opt.is-on small{color:var(--color-primary)}
  /* 충전 수단 행 */
  .method{display:flex;align-items:center;gap:12px;padding:6px 0 2px}
  .method__mark{width:42px;height:42px;padding:0;border-radius:var(--radius-md);box-shadow:none;font-size:13px;font-weight:var(--weight-extrabold);flex-shrink:0}
  .method__body{flex:1;min-width:0}
  .method__name{font-size:var(--fs-subtitle);font-weight:var(--weight-semibold);color:var(--text-title)}
  .method__sub{font-size:var(--fs-caption);color:var(--text-muted);margin-top:2px}
</style></head><body>
  <div class="phone"><div class="screen surface-money">

    <header class="appbar">
      <svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <div class="appbar__title">충전</div>
      <span style="width:24px"></span>
    </header>

    <div class="headline">
      <h1>포인트<br><span class="light">충전</span></h1>
    </div>

    <!-- 충전 금액 입력 (원 대 포인트 1:1) -->
    <label class="field field--amount" style="margin-top:16px">
      <span class="field__label">충전 금액</span>
      <input class="field__input num" inputmode="numeric" value="30,000">
    </label>

    <div class="field__label" style="margin:16px 20px 8px">빠른 선택</div>
    <div class="amount-grid">
      <button class="amount-opt num">10,000<small>원</small></button>
      <button class="amount-opt num is-on">30,000<small>원</small></button>
      <button class="amount-opt num">50,000<small>원</small></button>
      <button class="amount-opt">직접 입력</button>
    </div>

    <!-- 충전 수단 -->
    <div class="card">
      <div class="card__head"><div class="card__title">충전 수단</div></div>
      <label class="method">
        <div class="btn btn--kakao method__mark">pay</div>
        <div class="method__body">
          <div class="method__name">카카오페이</div>
          <div class="method__sub">간편충전 · 즉시 반영</div>
        </div>
        <span class="radio"><input type="radio" name="pay" checked><span class="radio__dot"></span></span>
      </label>
    </div>

    <!-- 충전 수수료 안내 -->
    <div class="notice">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7.8" r="1.1" fill="currentColor"/></svg>
      <div class="notice__text">충전·출금 <b>수수료 0원</b>. 충전한 포인트는 모임 정산에만 사용돼요.</div>
    </div>

    <div class="cta-bar">
      <div class="cta-bar__meta">충전 금액<br><b class="num">30,000P</b></div>
      <button class="btn btn--primary">충전하기</button>
    </div>

  </div></div>
</body></html>
