<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>모이쇼 — W-15 만남 전 취소·환불</title>
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>
  body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
  .sum-rows{margin-top:2px}
  .sum-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F1F3F8}
  .sum-row:last-child{border-bottom:none}
  .sum-row .k{font-size:var(--fs-body);color:var(--text-body)}
  .sum-row .v{font-size:var(--fs-subtitle);font-weight:var(--weight-bold);color:var(--text-strong);font-feature-settings:var(--font-feature-numeric)}
  .sum-row .v.free{color:var(--color-success-strong)}
  .sum-total{display:flex;align-items:baseline;justify-content:space-between;padding:13px 0 2px;margin-top:4px;border-top:1.5px solid var(--border-default)}
  .sum-total .k{font-size:var(--fs-body);font-weight:var(--weight-bold);color:var(--text-title)}
  .sum-total .v{font-size:22px;font-weight:var(--weight-extrabold);color:var(--text-strong);letter-spacing:-.01em;font-feature-settings:var(--font-feature-numeric)}
</style></head><body>
  <div class="phone"><div class="screen surface-money">

    <header class="appbar">
      <svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <div class="appbar__title">예치 취소</div>
      <span style="width:24px"></span>
    </header>

    <!-- 모임 정체성 행 — community 색 권한(코랄) 국소 적용 -->
    <div class="identity">
      <div class="identity__avatar">모디</div>
      <div class="identity__name">디자인동아리 모디 <span class="chip">총무 김산</span></div>
    </div>

    <div class="headline">
      <h1>예치를 지금<br><span class="light">취소</span>할까요?</h1>
      <div class="meta">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        6/30 19:00
        <span class="meta__dot"></span>
        만남시각 전
        <span class="meta__end">취소 가능</span>
      </div>
    </div>

    <!-- 환불 요약 -->
    <div class="card">
      <div class="card__head"><div class="card__title">환불 요약</div></div>
      <div class="sum-rows">
        <div class="sum-row"><span class="k">내 예치금</span><span class="v num">52,000P</span></div>
        <div class="sum-row"><span class="k">취소 수수료</span><span class="v free num">0원</span></div>
        <div class="sum-total"><span class="k">환불 예정</span><span class="v num">52,000P</span></div>
      </div>
    </div>

    <!-- 모금 안내 (블루 슬랩) -->
    <div class="slab">
      <div class="slab__label">기간 제한형 모금</div>
      <div class="slab__note">
        <svg class="icon" viewBox="0 0 24 24"><rect x="4.5" y="10.5" width="15" height="10" rx="2.2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8 10.5V7.5a4 4 0 018 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>만남시각 전이라 <b>즉시 전액 환불</b>돼요. 총무 출금은 <b>계속 잠긴 상태</b>라 안전해요.</span>
      </div>
    </div>

    <div class="cta-bar">
      <div class="cta-bar__meta">환불 예정<br><b class="num">52,000P</b></div>
      <button class="btn btn--ghost btn--sm">그대로 두기</button>
      <button class="btn btn--primary">취소하고 환불</button>
    </div>

  </div></div>
</body></html>
