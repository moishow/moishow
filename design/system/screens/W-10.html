<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>
  body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
  /* 폼 보조 */
  .pct-grid { display: flex; gap: 8px; margin: 0 20px; }
  .pct-grid .radio { flex: 1; justify-content: center; border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 11px 0; gap: 7px; }
  .field-hint { font-size: var(--fs-caption); color: var(--text-muted); margin: 7px 20px 0; line-height: var(--lh-normal); }
</style></head><body>
      <div class="phone"><div class="screen surface-money">
        <header class="appbar">
          <svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <div class="appbar__title">모임 만들기</div>
          <span style="width:24px"></span>
        </header>
        <div class="headline"><h1>새 차수를<br><span class="light">개설</span>해요</h1></div>
        <div style="height:14px"></div>
        <label class="field">
          <span class="field__label">모임 이름</span>
          <input class="field__input" value="봄 시즌 킥오프" />
        </label>
        <label class="field">
          <span class="field__label">카테고리</span>
          <span class="select"><input class="field__input" readonly value="동아리·소모임" /></span>
        </label>
        <label class="field">
          <span class="field__label">만남 일시 · 장소</span>
          <input class="field__input" value="6/30 (월) 19:00 · 성수동 글로우 스튜디오" />
        </label>
        <label class="field">
          <span class="field__label">신청 마감 <span style="color:var(--text-faint);font-weight:var(--weight-medium)">· 만남시각 전</span></span>
          <input class="field__input" value="6/28 (토) 23:59" />
        </label>
        <div class="field-hint">이 시각까지 <b style="color:var(--text-body)">신청·예치</b>할 수 있어요. 마감 후엔 인원이 확정되고, 만남시각 전까지 <b style="color:var(--text-body)">취소</b>만 가능해요.</div>
        <div style="height:14px"></div>
        <label class="field field--amount">
          <span class="field__label">예상 1인 회비 (예치 금액)</span>
          <input class="field__input num" value="52,000" />
        </label>
        <div class="field-hint">신청 시 이 금액이 포인트로 <b style="color:var(--text-body)">모금에 예치</b>돼요. 차액은 차수 종료 후 정산·환급됩니다.</div>
        <div style="height:14px"></div>
        <span class="field__label" style="margin:0 20px 6px;display:block">노쇼 페널티 비율 <span style="color:var(--text-faint);font-weight:var(--weight-medium)">· 주최자 설정</span></span>
        <div class="pct-grid">
          <label class="radio"><input type="radio" name="pct"><span class="radio__dot"></span>10%</label>
          <label class="radio"><input type="radio" name="pct" checked><span class="radio__dot"></span>20%</label>
          <label class="radio"><input type="radio" name="pct"><span class="radio__dot"></span>30%</label>
          <label class="radio"><input type="radio" name="pct"><span class="radio__dot"></span>50%</label>
        </div>
        <div class="field-hint">동의창(10분) 안에 동의를 안 누르면 <b style="color:var(--text-body)">노쇼</b>로 처리돼요. 예치금에서 페널티를 뗀 나머지를 환급하고, <b style="color:var(--text-body)">페널티는 이 모임을 위해 주최자가 사용</b>해요(개인 출금 불가).</div>
        <label class="checkbox" style="margin:16px 20px 0">
          <input type="checkbox" checked />
          <span class="checkbox__box"><svg class="icon"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span>
          모금·정산 약관에 동의합니다
        </label>
        <div class="cta-bar">
          <div class="cta-bar__meta">예상 모금<br><b class="num">1,820,000원</b></div>
          <button class="btn btn--primary">차수 개설</button>
        </div>
      </div></div>
</body></html>
