<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>모이쇼 — 지갑 개설 완료 (W-04)</title>
<!-- W-04 지갑 개설 완료(축하): surface-community, 마스코트 허용(완료 모먼트).
     민트 배지는 완료 상태색 → 코랄 안 씀. CTA "홈으로"는 .btn--primary(블루). -->
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>
  body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
  .wallet-hero{text-align:center;padding:44px 28px 8px}
  .wallet-hero__art{width:140px;height:140px;margin:0 auto 12px;display:block}
  .wallet-hero .badge{margin-bottom:14px}
  .wallet-hero .badge .icon{width:14px;height:14px}
  .wallet-hero__desc{margin-top:12px;font-size:var(--fs-body);color:var(--text-muted);line-height:var(--lh-relaxed)}
</style></head><body>

<div class="phone"><div class="screen surface-community">

  <div class="wallet-hero">
    <img class="wallet-hero__art" src="../assets/mascots/mascot_blue.png" alt="모이쇼 마스코트"
         onerror="this.style.display='none'">
    <span class="badge badge--done">
      <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      본인인증 완료 · verified
    </span>
    <h1 class="t-editorial">지갑이<br><span class="light">열렸어요</span></h1>
    <p class="wallet-hero__desc">이제 회비를 모으고<br>정산할 수 있어요</p>
  </div>

  <div class="cta-bar">
    <button class="btn btn--primary btn--block">홈으로</button>
  </div>

</div></div>

</body></html>
