<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>
  body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
  /* 총무 대시보드 mini-stat */
  .stat-grid { display: flex; gap: 10px; margin: 14px 20px 0; }
  .stat-card { flex: 1; background: var(--surface-sunken); border-radius: var(--radius-lg); padding: 13px 14px; }
  .stat-card__k { font-size: var(--fs-micro); color: var(--text-muted); font-weight: var(--weight-semibold); }
  .stat-card__v { font-size: var(--fs-heading); font-weight: var(--weight-extrabold); color: var(--text-strong); letter-spacing: var(--ls-display); font-feature-settings: var(--font-feature-numeric); margin-top: 3px; }
  .stat-card__v small { font-size: var(--fs-caption); font-weight: var(--weight-bold); color: var(--text-muted); }
</style></head><body>
      <div class="phone"><div class="screen surface-money">
        <header class="appbar">
          <svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          <div class="appbar__title">총무 대시보드</div>
          <svg class="icon"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/></svg>
        </header>
        <div class="identity">
          <div class="identity__avatar">모디</div>
          <div class="identity__name">디자인동아리 모디 <span class="chip">총무 김산</span></div>
        </div>
        <div class="headline"><h1>오늘 챙길<br><span class="light">정산</span> 3건</h1></div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-card__k">출금 대기</div><div class="stat-card__v">1</div></div>
          <div class="stat-card"><div class="stat-card__k">증빙 마감</div><div class="stat-card__v num" style="color:var(--color-danger)">08:24</div></div>
          <div class="stat-card"><div class="stat-card__k">미납 추적</div><div class="stat-card__v num">3</div></div>
        </div>
        <div class="card">
          <div class="card__head"><div class="card__title">모임별 정산 현황</div></div>
          <div class="checklist">
            <div class="check-row" style="align-items:flex-start">
              <div class="check-row__left" style="align-items:flex-start">
                <div class="check-row__radio" style="border-color:var(--color-primary);color:var(--color-primary);margin-top:1px"><svg class="icon"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2.4" fill="none"/><path d="M12 8v4l2.5 1.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div>
                <span class="check-row__text" style="color:var(--text-title);font-weight:var(--weight-semibold)">봄 시즌 킥오프<br><span class="t-caption">증빙 1/3 · 잔액 반납 대기</span></span>
              </div>
              <span class="badge badge--danger">08:24 남음</span>
            </div>
            <div class="check-row" style="align-items:flex-start">
              <div class="check-row__left" style="align-items:flex-start">
                <div class="check-row__radio" style="border-color:var(--color-warm);color:var(--color-warm);margin-top:1px"><svg class="icon"><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></div>
                <span class="check-row__text" style="color:var(--text-title);font-weight:var(--weight-semibold)">6월 정기모임<br><span class="t-caption">만남 임박 · 동의 요청 전송 가능</span></span>
              </div>
              <span class="badge badge--waiting">동의 대기</span>
            </div>
            <div class="check-row is-checked" style="align-items:flex-start">
              <div class="check-row__left" style="align-items:flex-start">
                <div class="check-row__radio" style="margin-top:1px"><svg class="icon"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
                <span class="check-row__text" style="text-decoration:none;color:var(--text-faint)">5월 모임<br><span class="t-caption">정산 완료 · 원장 균형 0</span></span>
              </div>
              <span class="badge badge--done">완료</span>
            </div>
          </div>
        </div>
        <div class="cta-bar">
          <div class="cta-bar__meta">증빙 마감까지<br><b class="num" style="color:var(--color-danger)">08:24:13</b></div>
          <button class="btn btn--primary">증빙 올리기</button>
        </div>
      </div></div>
</body></html>
