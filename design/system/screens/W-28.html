<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
/* W-28 쇼 글 작성 — 화면 고유 레이아웃만 */
.compose-head{display:flex;align-items:center;gap:11px;padding:12px 20px 0;}
.compose-head__avatar{width:40px;height:40px;border-radius:var(--radius-md);background:var(--color-warm);color:var(--color-warm-on);display:flex;align-items:center;justify-content:center;font-weight:var(--weight-bold);font-size:14px;box-shadow:var(--glow-warm);}
.compose-head__name{font-size:var(--fs-subtitle);font-weight:var(--weight-bold);color:var(--text-title);}
.compose-scope{display:inline-flex;align-items:center;gap:5px;margin-top:4px;background:var(--surface-sunken);border:none;color:var(--text-muted);font-size:var(--fs-caption);font-weight:var(--weight-semibold);padding:4px 10px;border-radius:var(--radius-pill);}
.compose-scope .icon{width:13px;height:13px;}
.compose-body{display:block;width:calc(100% - 40px);margin:16px 20px 0;box-sizing:border-box;min-height:150px;border:none;resize:none;font-family:inherit;font-size:var(--fs-subtitle);color:var(--text-strong);line-height:var(--lh-relaxed);background:transparent;}
.compose-body::placeholder{color:var(--text-faint);}
.compose-body:focus{outline:none;}
.photo-strip{display:flex;gap:10px;padding:14px 20px 0;}
.photo-add{width:84px;height:84px;border:1.5px dashed var(--border-strong);border-radius:var(--radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--text-muted);background:var(--surface-sunken);flex-shrink:0;}
.photo-add .icon{width:22px;height:22px;}
.photo-add span{font-size:11px;font-weight:var(--weight-semibold);}
.photo-thumb{width:84px;height:84px;border-radius:var(--radius-md);position:relative;flex-shrink:0;background:linear-gradient(135deg,var(--coral-100),var(--moisho-blue-100));}
.photo-thumb__x{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:var(--surface-overlay);color:var(--white);display:flex;align-items:center;justify-content:center;}
.photo-thumb__x .icon{width:12px;height:12px;}
.tag-picker{display:flex;flex-wrap:wrap;gap:8px;padding:6px 20px 0;}
.chip--pick{cursor:pointer;font-size:var(--fs-caption);padding:7px 13px;}
.chip--on{background:var(--color-warm);color:var(--color-warm-on);}
</style></head><body>
  <div class="phone"><div class="screen surface-community">

    <header class="appbar">
      <svg class="icon" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <div class="appbar__title">새 쇼</div>
      <button class="btn btn--warm btn--sm">게시</button>
    </header>

    <div class="compose-head">
      <div class="compose-head__avatar">산</div>
      <div>
        <div class="compose-head__name">김산</div>
        <button class="compose-scope">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 12h18M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          전체 공개
          <svg class="icon" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
      </div>
    </div>

    <textarea class="compose-body" placeholder="오늘 모임은 어땠나요? 사진과 함께 소식을 남겨보세요."></textarea>

    <div class="photo-strip">
      <button class="photo-add">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2.5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="13.5" r="3.4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8.2 7l1.1-2h5.4l1.1 2" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/></svg>
        <span>사진 추가</span>
      </button>
      <div class="photo-thumb">
        <div class="photo-thumb__x"><svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div>
      </div>
      <div class="photo-thumb">
        <div class="photo-thumb__x"><svg class="icon" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-title" style="padding-bottom:0;font-size:var(--fs-subtitle)">모임 태그</div>
    <div class="tag-picker">
      <span class="chip chip--pick chip--on"># 디자인동아리 모디</span>
      <span class="chip chip--pick"># 봄시즌킥오프</span>
      <span class="chip chip--pick"># 성수동</span>
      <span class="chip chip--pick"># 뒤풀이</span>
    </div>

  </div></div>
</body></html>
