<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
/* W-30 DM 대화방 — 화면 고유 레이아웃만 */
.appbar-peer{display:flex;align-items:center;gap:10px;}
.dm-peer{display:flex;align-items:center;gap:9px;}
.dm-peer__avatar{width:34px;height:34px;border-radius:var(--radius-full);background:var(--color-warm);color:var(--color-warm-on);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:var(--weight-bold);}
.dm-peer__name{font-size:var(--fs-subtitle);font-weight:var(--weight-bold);color:var(--text-title);line-height:1.15;}
.dm-peer__name small{font-weight:var(--weight-medium);color:var(--text-muted);font-size:12px;}
.dm-peer__role{font-size:11px;color:var(--text-muted);margin-top:2px;}
.chat{display:flex;flex-direction:column;gap:12px;padding:16px 16px 0;}
.chat-day{align-self:center;background:var(--surface-sunken);color:var(--text-muted);font-size:11px;font-weight:var(--weight-semibold);padding:4px 12px;border-radius:var(--radius-pill);margin:2px 0 6px;}
.msg{display:flex;align-items:flex-end;gap:6px;max-width:80%;}
.msg--in{align-self:flex-start;}
.msg--out{align-self:flex-end;flex-direction:row-reverse;}
.msg__avatar{width:30px;height:30px;border-radius:var(--radius-full);background:var(--color-warm);color:var(--color-warm-on);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:var(--weight-bold);flex-shrink:0;}
.bubble{padding:10px 13px;border-radius:16px;font-size:14px;line-height:var(--lh-snug);}
.msg--in .bubble{background:var(--surface-sunken);color:var(--text-body);border-bottom-left-radius:5px;}
.msg--out .bubble{background:var(--color-warm);color:var(--color-warm-on);border-bottom-right-radius:5px;}
.msg__time{font-size:10.5px;color:var(--text-faint);flex-shrink:0;}
.chat-bar{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border-subtle);padding:12px 16px 18px;display:flex;align-items:center;gap:10px;}
.chat-bar__plus{width:38px;height:38px;border-radius:50%;background:var(--surface-sunken);color:var(--text-muted);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-bar__plus .icon{width:20px;height:20px;}
.chat-input{flex:1;min-width:0;border:1px solid var(--border-default);border-radius:var(--radius-pill);padding:11px 16px;font-size:var(--fs-body);font-family:inherit;color:var(--text-strong);background:var(--surface-card);}
.chat-input::placeholder{color:var(--text-faint);}
.chat-input:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px var(--color-warm-soft);}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--color-warm);color:var(--color-warm-on);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--glow-warm);}
.chat-send .icon{width:20px;height:20px;}
</style></head><body>
  <div class="phone"><div class="screen surface-community">

    <header class="appbar">
      <div class="appbar-peer">
        <svg class="icon" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        <div class="dm-peer">
          <div class="dm-peer__avatar">산</div>
          <div>
            <div class="dm-peer__name">김산 <small>(총무)</small></div>
            <div class="dm-peer__role">디자인동아리 모디</div>
          </div>
        </div>
      </div>
      <svg class="icon" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/></svg>
    </header>

    <div class="chat">
      <div class="chat-day">6월 30일 화요일</div>

      <div class="msg msg--in">
        <div class="msg__avatar">산</div>
        <div class="bubble">안녕하세요! 봄 시즌 킥오프 정산 관련해서 여쭤볼 게 있어요.</div>
        <span class="msg__time num">오후 2:14</span>
      </div>

      <div class="msg msg--out">
        <div class="bubble">네 총무님, 편하게 말씀하세요.</div>
        <span class="msg__time num">오후 2:15</span>
      </div>

      <div class="msg msg--in">
        <div class="msg__avatar">산</div>
        <div class="bubble">뒤풀이 영수증 한 장이 누락돼서 잔액 반납이 조금 늦어질 것 같아요. 오늘 저녁까지는 꼭 올릴게요!</div>
        <span class="msg__time num">오후 2:16</span>
      </div>

      <div class="msg msg--out">
        <div class="bubble">알겠습니다. 반납 마감 전이라 괜찮아요.</div>
        <span class="msg__time num">오후 2:17</span>
      </div>

      <div class="msg msg--out">
        <div class="bubble">증빙 올라오면 정산 알림 갈 거예요.</div>
        <span class="msg__time num">오후 2:17</span>
      </div>
    </div>

    <div class="chat-bar">
      <button class="chat-bar__plus"><svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      <input class="chat-input" placeholder="메시지 입력">
      <button class="chat-send"><svg class="icon" viewBox="0 0 24 24"><path d="M4 11.5l15-7-7 15-2-6-6-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button>
    </div>

  </div></div>
</body></html>
