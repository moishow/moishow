<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>모이쇼 제안 — 쇼 피드 2탭 (안건 8)</title>
    <link rel="stylesheet" href="../../tokens.css" />
    <link rel="stylesheet" href="../../components.css" />
    <style>
      body {
        margin: 0;
        background: #fff;
        display: flex;
        justify-content: center;
        padding: 0;
      }
      /* 세그먼트 2탭 (소속 | 둘러보기) */
      .seg {
        display: flex;
        gap: 0;
        margin: 6px 20px 2px;
        background: var(--surface-sunken);
        border-radius: var(--radius-pill);
        padding: 4px;
      }
      .seg__item {
        flex: 1;
        text-align: center;
        padding: 9px 0;
        font-size: var(--fs-body);
        font-weight: var(--weight-bold);
        color: var(--text-muted);
        border-radius: var(--radius-pill);
        cursor: pointer;
      }
      .seg__item.is-on {
        background: var(--surface-card);
        color: var(--color-warm-strong);
        box-shadow: var(--shadow-xs);
      }
      /* 쇼 피드 카드 (W-27 패턴 재사용) */
      .feed {
        margin: 10px 20px 0;
      }
      .feed-card {
        background: var(--surface-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-card);
        overflow: hidden;
        margin-bottom: 14px;
      }
      .feed-card__head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 15px 11px;
      }
      .feed-card__av {
        width: 34px;
        height: 34px;
        border-radius: var(--radius-md);
        color: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: var(--weight-bold);
      }
      .feed-card__who {
        font-size: 13.5px;
        font-weight: var(--weight-bold);
        color: var(--text-title);
      }
      .feed-card__when {
        font-size: var(--fs-micro);
        color: var(--text-muted);
        margin-top: 1px;
      }
      .feed-card__img {
        height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.9);
      }
      .feed-card__img .icon {
        width: 40px;
        height: 40px;
      }
      .feed-card__txt {
        padding: 12px 15px 4px;
        font-size: 13.5px;
        color: var(--text-body);
        line-height: var(--lh-normal);
      }
      .feed-bar {
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 10px 15px 13px;
        color: var(--text-muted);
        font-size: var(--fs-caption);
        font-weight: var(--weight-semibold);
      }
      .feed-bar span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .feed-bar .icon {
        width: 17px;
        height: 17px;
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="screen surface-community">
        <header class="appbar">
          <div class="appbar__title" style="font-weight: var(--weight-bold)">쇼</div>
          <svg class="icon"><path d="M5 19h14M14 4l4 4-9 9H5v-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
        </header>

        <!-- 2탭: 소속(내 동아리 소식) | 둘러보기(공개 발견) -->
        <div class="seg">
          <div class="seg__item is-on">소속</div>
          <div class="seg__item">둘러보기</div>
        </div>
        <p class="t-caption" style="padding: 2px 20px 0">내가 가입한 동아리 소식 · 둘러보기 탭은 공개 동아리 발견</p>

        <div class="feed">
          <article class="feed-card">
            <div class="feed-card__head">
              <div class="feed-card__av" style="background: var(--color-warm)">모디</div>
              <div>
                <div class="feed-card__who">디자인동아리 모디</div>
                <div class="feed-card__when">2시간 전 · 봄 시즌 킥오프</div>
              </div>
            </div>
            <div class="feed-card__img" style="background: linear-gradient(135deg, var(--coral-300), var(--color-warm))">
              <svg class="icon">
                <rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none" />
                <circle cx="8.5" cy="10" r="1.6" fill="currentColor" />
                <path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
              </svg>
            </div>
            <p class="feed-card__txt">봄 시즌 킥오프 무사 종료. 다들 고생 많았어요. 정산도 투명하게 끝!</p>
            <div class="feed-bar">
              <span>
                <svg class="icon"><path d="M12 20s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 10c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" /></svg>
                <b class="num">24</b>
              </span>
              <span>
                <svg class="icon"><path d="M4 5h16v11H9l-4 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" /></svg>
                <b class="num">5</b>
              </span>
            </div>
          </article>
          <article class="feed-card">
            <div class="feed-card__head">
              <div class="feed-card__av" style="background: var(--color-primary)">풋살</div>
              <div>
                <div class="feed-card__who">수요풋살 클럽</div>
                <div class="feed-card__when">어제 · 6월 구장 대관</div>
              </div>
            </div>
            <p class="feed-card__txt" style="padding-top: 2px">이번 주 수요일 7시 같은 구장이요. 동의 요청 가면 까먹지 말고 눌러주세요!</p>
            <div class="feed-bar">
              <span>
                <svg class="icon"><path d="M12 20s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 10c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" /></svg>
                <b class="num">11</b>
              </span>
              <span>
                <svg class="icon"><path d="M4 5h16v11H9l-4 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" /></svg>
                <b class="num">2</b>
              </span>
            </div>
          </article>
        </div>

        <nav class="tabbar">
          <div class="tabbar__item">
            <svg class="icon">
              <path d="M4 11l8-7 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
              <path d="M6 10v9a1 1 0 001 1h10a1 1 0 001-1v-9" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
            홈
          </div>
          <div class="tabbar__item is-active">
            <svg class="icon">
              <rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none" />
              <circle cx="8.5" cy="10" r="1.6" fill="currentColor" />
              <path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
            쇼
          </div>
          <div class="tabbar__fab">
            <svg class="icon"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" /></svg>
          </div>
          <div class="tabbar__item">
            <svg class="icon"><path d="M4 5.5h16v10H9l-4 3.2v-3.2H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" /></svg>
            DM
          </div>
          <div class="tabbar__item">
            <svg class="icon">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none" />
              <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            마이
          </div>
        </nav>
      </div>
    </div>
  </body>
</html>
