<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>모이쇼 제안 — 관심 카테고리 선택 (안건 1)</title>
    <link rel="stylesheet" href="../../tokens.css" />
    <link rel="stylesheet" href="../../components.css" />
    <style>
      body {
        margin: 0;
        background: #fff;
        display: flex;
        justify-content: center;
        padding: 0;
      }
      /* 화면 고유 레이아웃만 (컴포넌트 복제 아님) */
      .cat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 14px 20px 0;
      }
      .cat-card {
        position: relative;
        border: 1.5px solid var(--border-default);
        border-radius: var(--radius-lg);
        padding: 15px 14px;
        display: flex;
        align-items: center;
        gap: 11px;
        background: var(--surface-card);
        cursor: pointer;
        transition:
          border-color var(--dur-fast) var(--ease-standard),
          background var(--dur-fast) var(--ease-standard);
      }
      .cat-card__ic {
        width: 40px;
        height: 40px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface-sunken);
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .cat-card__ic .icon {
        width: 22px;
        height: 22px;
      }
      .cat-card__t {
        font-size: var(--fs-body);
        font-weight: var(--weight-bold);
        color: var(--text-title);
      }
      .cat-card.is-on {
        border-color: var(--color-warm);
        background: var(--color-warm-soft);
      }
      .cat-card.is-on .cat-card__ic {
        background: var(--color-warm);
        color: var(--white);
      }
      .cat-card.is-on .cat-card__t {
        color: var(--color-warm-strong);
      }
      .cat-card__ck {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--color-warm);
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .cat-card__ck .icon {
        width: 12px;
        height: 12px;
      }
      .cat-card.is-on .cat-card__ck {
        display: flex;
      }
      .skip {
        font-size: var(--fs-body);
        color: var(--text-muted);
        font-weight: var(--weight-semibold);
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="screen surface-community" style="padding-bottom: 96px">
        <header class="appbar">
          <span style="width: 24px"></span>
          <div class="appbar__title">관심사</div>
          <span class="skip">건너뛰기</span>
        </header>

        <div class="headline">
          <h1>
            어떤 모임을
            <br />
            <span style="color: var(--color-warm)">좋아하세요?</span>
          </h1>
        </div>
        <p class="t-caption" style="padding: 8px 20px 0">
          고른 관심사로 홈·탐색 추천을 맞춰드려요 ·
          <b class="num" style="color: var(--color-warm-strong)">3</b>
          개 이상
        </p>

        <div class="cat-grid">
          <!-- 운동/스포츠 -->
          <div class="cat-card is-on">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M4 9l2-2M20 15l-2 2M8 4l2 2M16 20l-2-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none" /></svg>
            </div>
            <div class="cat-card__t">운동 · 스포츠</div>
          </div>
          <!-- 스터디/자기계발 -->
          <div class="cat-card is-on">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24">
                <path
                  d="M4 5.5h7a2 2 0 012 2V20a2.5 2.5 0 00-2.2-1.4H4z M20 5.5h-7a2 2 0 00-2 2V20a2.5 2.5 0 012.2-1.4H20z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                  fill="none"
                />
              </svg>
            </div>
            <div class="cat-card__t">스터디 · 자기계발</div>
          </div>
          <!-- 취미/여가 -->
          <div class="cat-card is-on">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 3l2.6 6 6.4.5-4.9 4.2 1.5 6.3L12 16.8 6.4 20.3l1.5-6.3L3 9.8 9.4 9z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" />
              </svg>
            </div>
            <div class="cat-card__t">취미 · 여가</div>
          </div>
          <!-- 문화/예술 -->
          <div class="cat-card">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M9 18V6l10-2v12" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" />
                <circle cx="6.5" cy="18" r="2.5" stroke="currentColor" stroke-width="2" fill="none" />
                <circle cx="16.5" cy="16" r="2.5" stroke="currentColor" stroke-width="2" fill="none" />
              </svg>
            </div>
            <div class="cat-card__t">문화 · 예술</div>
          </div>
          <!-- 봉사/사회참여 -->
          <div class="cat-card">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 20s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 10c0 5.5-7 10-7 10z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" />
              </svg>
            </div>
            <div class="cat-card__t">봉사 · 사회참여</div>
          </div>
          <!-- 푸드/드링크 -->
          <div class="cat-card">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M6 8h11l-1 11a1 1 0 01-1 1H8a1 1 0 01-1-1z M17 8h1.5a2.5 2.5 0 010 5H16" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" />
              </svg>
            </div>
            <div class="cat-card__t">푸드 · 드링크</div>
          </div>
          <!-- 여행/아웃도어 -->
          <div class="cat-card">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M12 21s-6-5.7-6-10a6 6 0 1112 0c0 4.3-6 10-6 10z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none" />
                <circle cx="12" cy="11" r="2.3" stroke="currentColor" stroke-width="2" fill="none" />
              </svg>
            </div>
            <div class="cat-card__t">여행 · 아웃도어</div>
          </div>
          <!-- 게임/보드 -->
          <div class="cat-card">
            <div class="cat-card__ck">
              <svg class="icon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" /></svg>
            </div>
            <div class="cat-card__ic">
              <svg class="icon" viewBox="0 0 24 24">
                <rect x="3" y="7" width="18" height="10" rx="4" stroke="currentColor" stroke-width="2" fill="none" />
                <path d="M7 11v2M6 12h2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <circle cx="16" cy="11.5" r="1" fill="currentColor" />
                <circle cx="18" cy="13.5" r="1" fill="currentColor" />
              </svg>
            </div>
            <div class="cat-card__t">게임 · 보드</div>
          </div>
        </div>

        <div class="cta-bar">
          <div class="cta-bar__meta">
            선택
            <br />
            <b class="num">3</b>
            개
          </div>
          <button class="btn btn--warm">다음</button>
        </div>
      </div>
    </div>
  </body>
</html>
