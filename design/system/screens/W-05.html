<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>
  body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
  /* 홈 */
  .greet { padding: 16px 20px 0; }
  .greet__hi { font-size: var(--fs-caption); color: var(--text-muted); }
  .balance { margin: 12px 20px 0; }
</style></head><body>
      <div class="phone"><div class="screen surface-money">
        <header class="appbar">
          <div class="appbar__title" style="font-weight:var(--weight-bold)">모이쇼</div>
          <svg class="icon"><path d="M6 9a6 6 0 1112 0c0 4 1.5 5 2 6H4c.5-1 2-2 2-6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/><path d="M10 19a2 2 0 004 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </header>
        <div class="greet">
          <div class="greet__hi">안녕하세요, 김산님</div>
          <h1 class="t-editorial" style="margin-top:4px">참여 중인 모임 <span class="num" style="color:var(--color-primary)">3</span></h1>
        </div>
        <div class="slab balance">
          <div class="slab__label">내 포인트 잔액</div>
          <div class="slab__figure"><span class="big num">128,400</span><span class="unit">P</span></div>
          <div class="slab__row"><span class="k">정산 대기 환급 예정</span><span class="v num">+12,300P</span></div>
        </div>
        <div class="section-title">내 모임</div>
        <div class="list">
          <div class="list-row">
            <div class="list-row__avatar" style="background:var(--moisho-blue-400)">모디</div>
            <div class="list-row__body">
              <div class="list-row__title">디자인동아리 모디 <span class="badge badge--progress">정산 진행</span></div>
              <div class="list-row__sub">봄 시즌 킥오프 · 35명 참여</div>
            </div>
            <svg class="icon" style="color:var(--text-faint)"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </div>
          <div class="list-row">
            <div class="list-row__avatar" style="background:var(--color-primary)">풋살</div>
            <div class="list-row__body">
              <div class="list-row__title">수요풋살 클럽 <span class="badge badge--waiting">동의 대기</span></div>
              <div class="list-row__sub">6월 구장 대관 · 12명 참여</div>
            </div>
            <svg class="icon" style="color:var(--text-faint)"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </div>
          <div class="list-row">
            <div class="list-row__avatar" style="background:var(--mint-600)">북클럽</div>
            <div class="list-row__body">
              <div class="list-row__title">한달한권 북클럽 <span class="badge badge--done">정산 완료</span></div>
              <div class="list-row__sub">5월 모임 · 8명 참여</div>
            </div>
            <svg class="icon" style="color:var(--text-faint)"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </div>
        </div>
        <nav class="tabbar">
          <div class="tabbar__item is-active"><svg class="icon"><path d="M4 11l8-7 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M6 10v9a1 1 0 001 1h10a1 1 0 001-1v-9" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>홈</div>
          <div class="tabbar__item"><svg class="icon"><rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="8.5" cy="10" r="1.6" fill="currentColor"/><path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>쇼</div>
          <div class="tabbar__fab"><svg class="icon"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
          <div class="tabbar__item"><svg class="icon"><path d="M4 5.5h16v10H9l-4 3.2v-3.2H4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/></svg>DM</div>
          <div class="tabbar__item"><svg class="icon"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>마이</div>
        </nav>
      </div></div>
</body></html>
