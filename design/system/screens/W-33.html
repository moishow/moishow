<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>모이쇼 — W-33 쇼 상세</title>
<link rel="stylesheet" href="../tokens.css"><link rel="stylesheet" href="../components.css">
<style>
  body{margin:0;background:#fff;display:flex;justify-content:center;padding:0}
  .post-head{display:flex;align-items:center;gap:10px;padding:12px 20px 12px}
  .post-av{width:38px;height:38px;border-radius:var(--radius-md);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:var(--weight-bold)}
  .post-who{font-size:14px;font-weight:var(--weight-bold);color:var(--text-title)}
  .post-when{font-size:var(--fs-micro);color:var(--text-muted);margin-top:1px}
  .post-img{height:236px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9)}
  .post-img .icon{width:46px;height:46px}
  .post-body{padding:14px 20px 4px;font-size:14.5px;color:var(--text-body);line-height:var(--lh-relaxed)}
  .post-stat{display:flex;gap:6px;padding:8px 20px 0;font-size:var(--fs-caption);color:var(--text-muted)}
  .actionbar{display:flex;align-items:center;gap:22px;margin:12px 20px 0;padding:12px 0;border-top:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle);color:var(--text-body);font-size:13.5px;font-weight:var(--weight-semibold)}
  .actionbar span{display:inline-flex;align-items:center;gap:7px}
  .actionbar .icon{width:20px;height:20px}
  .actionbar .liked{color:var(--color-warm)}
  .cmt-title{font-size:var(--fs-body);font-weight:var(--weight-bold);color:var(--text-title);padding:16px 20px 2px}
  .cmt{display:flex;gap:10px;padding:11px 20px}
  .cmt-av{width:30px;height:30px;border-radius:var(--radius-md);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:var(--weight-bold);flex-shrink:0}
  .cmt-body{flex:1;min-width:0}
  .cmt-name{font-size:12.5px;font-weight:var(--weight-bold);color:var(--text-title)}
  .cmt-text{font-size:13.5px;color:var(--text-body);margin-top:2px;line-height:var(--lh-normal)}
  .cmt-meta{font-size:var(--fs-micro);color:var(--text-faint);margin-top:4px;display:flex;gap:12px}
  .cmt-input{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;gap:10px;padding:11px 16px 16px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border-subtle)}
  .cmt-input input{flex:1;border:1px solid var(--border-default);border-radius:var(--radius-pill);padding:11px 16px;font-size:14px;font-family:inherit;color:var(--text-strong)}
  .cmt-input input:focus{outline:none;border-color:var(--border-focus)}
  .cmt-send{width:40px;height:40px;border-radius:50%;border:none;background:var(--color-warm);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--glow-warm)}
  .cmt-send .icon{width:20px;height:20px}
</style></head><body>
  <div class="phone"><div class="screen surface-community" style="padding-bottom:78px">
    <header class="appbar">
      <svg class="icon"><path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      <div class="appbar__title">쇼</div>
      <svg class="icon"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/></svg>
    </header>

    <div class="post-head">
      <div class="post-av" style="background:var(--color-warm)">모디</div>
      <div><div class="post-who">디자인동아리 모디</div><div class="post-when">2시간 전 · 봄 시즌 킥오프</div></div>
    </div>

    <div class="post-img" style="background:linear-gradient(135deg,var(--coral-300),var(--color-warm))">
      <svg class="icon"><rect x="3" y="5" width="18" height="14" rx="2.4" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="8.5" cy="10" r="1.6" fill="currentColor"/><path d="M5 17l4.5-4 3 2.2L16 11l3 3.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    </div>

    <p class="post-body">봄 시즌 킥오프 무사 종료. 다들 고생 많았어요. 회비도 투명하게 정산 끝났고, 다음 모임 때 또 봬요!</p>
    <div class="post-stat"><span class="num">좋아요 24</span><span>·</span><span class="num">댓글 5</span></div>

    <div class="actionbar">
      <span class="liked"><svg class="icon"><path d="M12 20s-7-4.5-7-10a4 4 0 017-2.6A4 4 0 0119 10c0 5.5-7 10-7 10z" fill="currentColor" stroke="none"/></svg>좋아요</span>
      <span><svg class="icon"><path d="M4 5h16v11H9l-4 3z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/></svg>댓글</span>
      <span><svg class="icon"><path d="M15 8l4 4-4 4M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>공유</span>
    </div>

    <div class="cmt-title">댓글 <span class="num">5</span></div>

    <div class="cmt">
      <div class="cmt-av" style="background:var(--color-primary)">이윤</div>
      <div class="cmt-body">
        <div class="cmt-name">이윤</div>
        <div class="cmt-text">환급 바로 들어왔네요 ㅎㅎ 정산 깔끔해서 좋았어요!</div>
        <div class="cmt-meta"><span>1시간 전</span><span>좋아요 3</span><span>답글</span></div>
      </div>
    </div>
    <div class="cmt">
      <div class="cmt-av" style="background:var(--mint-600)">박서</div>
      <div class="cmt-body">
        <div class="cmt-name">박서진</div>
        <div class="cmt-text">사진 잘 나왔다 ㅋㅋ 다음엔 단체샷도 찍어요</div>
        <div class="cmt-meta"><span>1시간 전</span><span>좋아요 1</span><span>답글</span></div>
      </div>
    </div>
    <div class="cmt">
      <div class="cmt-av" style="background:var(--gray-400)">정민</div>
      <div class="cmt-body">
        <div class="cmt-name">정민호</div>
        <div class="cmt-text">고생하셨어요 총무님!</div>
        <div class="cmt-meta"><span>40분 전</span><span>답글</span></div>
      </div>
    </div>

    <div class="cmt-input">
      <input placeholder="댓글을 남겨보세요">
      <button class="cmt-send"><svg class="icon"><path d="M5 12l14-7-5 14-3-5-6-2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/></svg></button>
    </div>
  </div></div>
</body></html>
